<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Pokedex</title>
        <link rel="stylesheet" href="index.css">
        <link rel="stylesheet" href="header.css">
        <link rel="stylesheet" href="type.css">
        <link rel="stylesheet" href="footer.css">
        <link rel="shortcut icon" href="img/pokeball.png" type="image/x-icon">
    </head>
    <body>
        <header>
            <img class="pokeball-header" src="img/pokeball.png" alt>
            <p class="header-title"><a href="index.html">Pokedex</a></p>
            <div>
                <input id="search" type="search"
                    placeholder="Search for a pokemon..."
                    minlength="3" required>
                <button onclick="searchPokemon()">Search</button>
                <button onclick="deleteSearch()">Delete</button>
            </div>
        </header>
        <div id="loading-screen">
            <div class="spinner"><img src="img/pokeball.png" alt></div>
        </div>
        <main id="pokemon-container"></main>
        <button id="load-more-btn">Load More Pokemon</button>
        <div id="overlay" class="hidden" onclick="closeOverlay()">
            <div id="overlay-content" onclick="event.stopPropagation()"></div>
        </div>
        <footer>
            <p>2026</p>
        </footer>
        <script src="template.js"></script>
        <script src="script.js"></script>
    </body>
</html>
